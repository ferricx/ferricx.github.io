<div class="textarea-group">
  <div class="label-row">
    <label [for]="inputId" class="textarea-label">{{ label }}@if (required) {<span class="required-indicator" aria-hidden="true"> *</span>}</label>
    @if (tipContent) {
      <app-popover-tip [ariaLabel]="'Show tip for ' + label">
        <ng-container [ngTemplateOutlet]="tipContent" />
      </app-popover-tip>
    }
  </div>
  <textarea
    [id]="inputId"
    [name]="name"
    [rows]="rows"
    [attr.maxlength]="maxLength"
    [required]="required"
    [attr.aria-describedby]="errorMessage() ? countId + ' ' + errorId : countId"
    [attr.aria-invalid]="errorMessage() ? 'true' : null"
    (input)="onInput($event)"
    (invalid)="onInvalid($event)"
    (blur)="onBlur($event)"
  ></textarea>
  <div class="footer-row">
    <div [id]="errorId" class="form-error" [class.visible]="!!errorMessage()">
      {{ label }} {{ errorMessage() }}
    </div>
    <span [id]="countId" class="char-count" aria-live="polite" aria-atomic="true">
      {{ count() }} {{ count() === 1 ? 'character' : 'characters' }} of {{ maxLength }}
    </span>
  </div>
</div>
