@if (errors().length > 0) {
  <nav
    #summaryBox
    class="error-summary"
    aria-labelledby="error-summary-heading"
  >
    <h2 id="error-summary-heading">Form errors</h2>
    <ul aria-labelledby="error-summary-heading">
      @for (error of errors(); track error.fieldId) {
        <li>
          <a [href]="'#' + error.fieldId" (click)="focusField($event, error.fieldId)">{{ error.label }} {{ error.message.endsWith('.') ? error.message.slice(0, -1) : error.message }}</a>
        </li>
      }
    </ul>
  </nav>
}
