@if (errors.length > 0) {
  <div
    #summaryBox
    class="error-summary"
    tabindex="-1"
  >
    <h2 id="error-summary-heading">Form errors:</h2>
    <ul aria-labelledby="error-summary-heading">
      @for (error of errors; track error.fieldId) {
        <li>
          <a [href]="'#' + error.fieldId" (click)="focusField($event, error.fieldId)">{{ error.label }}: {{ error.message }}</a>
        </li>
      }
    </ul>
  </div>
}
