@if (errors.length > 0) {
  <div
    #summaryBox
    class="error-summary"
  >
    <h2 id="error-summary-heading">Form errors:</h2>
    <ul role="list" aria-labelledby="error-summary-heading">
      @for (error of errors; track error.fieldId) {
        <li>
          <a [href]="'#' + error.fieldId" (click)="focusField($event, error.fieldId)" aria-roledescription="list item, link">{{ error.label }} {{ error.message }}</a>
        </li>
      }
    </ul>
  </div>
}
