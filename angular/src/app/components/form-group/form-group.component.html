<div class="label-row">
  <label [for]="fieldId">
    <span class="label-main">{{ label }}</span>
    @if (hint) {
      <span class="label-hint">{{ hint }}</span>
    }
    @if (required) {
      <span class="required-indicator" aria-hidden="true">*</span>
      <span class="sr-only"> (required)</span>
    }
  </label>

  @if (tipContent) {
    <app-popover-tip [ariaLabel]="'Show tip for ' + label">
      <ng-container [ngTemplateOutlet]="tipContent"></ng-container>
    </app-popover-tip>
  }
</div>

<input
  #fieldInput
  [id]="fieldId"
  [name]="name"
  [type]="type"
  [attr.autocomplete]="autocomplete || null"
  [attr.inputmode]="inputmode"
  [attr.pattern]="pattern"
  [attr.maxlength]="maxlength"
  [attr.required]="required ? '' : null"
  [required]="required"
  [attr.aria-describedby]="errorId"
  (invalid)="nativeValidation ? null : onInvalid($event)"
  (blur)="nativeValidation ? null : onBlur()"
/>

<div [id]="errorId" class="form-error">{{ errorMessage() }}</div>
