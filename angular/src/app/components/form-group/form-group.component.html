<div class="label-row">
  <label [for]="fieldId">
    <span class="label-main">{{ label }}</span>
    @if (hint) {
      <span class="label-hint">{{ hint }}</span>
    <input
      #fieldInput
      [id]="fieldId"
      [name]="name"
      [type]="type"
      [attr.autocomplete]="autocomplete || null"
      [attr.inputmode]="inputmode || null"
      [attr.maxlength]="maxlength || null"
      [required]="required"
      [pattern]="pattern || null"
      [autofocus]="autofocus"
      [attr.aria-describedby]="hint ? hintId : null"
      [attr.aria-invalid]="errorMessage() ? 'true' : null"
      [attr.aria-errormessage]="errorMessage() ? errorId : null"
      (invalid)="onInvalid($event)"
      (blur)="onBlur()"
      (input)="onInput()"
      [attr.native-validation]="nativeValidation ? '' : null"
      />
  [attr.autocomplete]="autocomplete || null"
  [attr.inputmode]="inputmode"
  [attr.pattern]="pattern"
  [attr.maxlength]="maxlength"
  [attr.required]="required ? '' : null"
  [required]="required"
  [attr.autofocus]="autofocus ? '' : null"
  [attr.aria-describedby]="errorId"
  (invalid)="nativeValidation ? null : onInvalid($event)"
  (blur)="nativeValidation ? null : onBlur()"
/>

<div [id]="errorId" class="form-error" [class.visible]="!!errorMessage()">{{ errorMessage() }}</div>
