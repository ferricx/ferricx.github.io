<div class="label-row">
  <div class="label-tip-row">
    <label [for]="fieldId">
      <span class="label-main">{{ label }}@if (required) {<span class="required-indicator" aria-hidden="true"> *</span>}</span>
    </label>
    @if (hint) {
      <span [id]="hintId" class="label-hint" aria-hidden="true">{{ hint }}</span>
    }
    @if (tipContent) {
      <app-popover-tip [ariaLabel]="'Show tip for ' + label">
        <ng-container [ngTemplateOutlet]="tipContent"></ng-container>
      </app-popover-tip>
    }
  </div>
  <input
    #fieldInput
    [id]="fieldId"
    [name]="name"
    [type]="type"
    [attr.autocomplete]="autocomplete || null"
    [attr.inputmode]="inputmode || null"
    [attr.maxlength]="maxlength || null"
    [required]="required"
    [attr.pattern]="pattern || null"
    [autofocus]="autofocus"
    [attr.aria-describedby]="hint && errorMessage() ? hintId + ' ' + errorId : hint ? hintId : errorMessage() ? errorId : null"
    [attr.aria-invalid]="errorMessage() ? 'true' : null"
    (invalid)="onInvalid($event)"
    (blur)="onBlur()"
    (input)="onInput()"
    [attr.native-validation]="nativeValidation ? '' : null"
  />
</div>
<div [id]="errorId" class="form-error" [class.visible]="!!errorMessage()">{{ errorMessage() }}</div>
