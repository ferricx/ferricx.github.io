<div class="label-row">
  <div class="label-tip-row">
    <label [id]="labelId" [for]="fieldId">
      <span class="label-main">{{ label }}@if (required) {<span class="required-indicator" aria-hidden="true"> *</span>}</span>
    </label>
    @if (hint) {
      <span class="label-hint" aria-hidden="true">{{ hint }}</span>
      <span [id]="hintId" class="sr-only">{{ hint }}</span>
    }
    @if (tipContent) {
      <app-popover-tip [ariaLabel]="'Show tip for ' + label">
        <ng-container [ngTemplateOutlet]="tipContent"></ng-container>
      </app-popover-tip>
    }
  </div>
</div>

<div class="combobox-wrapper" [style.anchor-name]="anchorName">
  <input
    #comboInput
    [id]="fieldId"
    [name]="name"
    type="text"
    role="combobox"
    autocomplete="off"
    readonly
    [attr.aria-expanded]="isOpen"
    [attr.aria-controls]="listboxId"
    [attr.aria-activedescendant]="activeDescendantId"
    aria-autocomplete="none"
    [attr.aria-labelledby]="labelId"
    [attr.aria-describedby]="hint && errorMessage ? hintId + ' ' + errorId : hint ? hintId : errorMessage ? errorId : null"
    [attr.required]="required ? '' : null"
    [attr.aria-required]="required || null"
    placeholder="Choose state"
    [value]="displayValue"
    (keydown)="onKeydown($event)"
    (blur)="onBlur()"
    (click)="onClick()"
  />
  <svg class="combobox-arrow" aria-hidden="true" viewBox="0 0 16 16" width="16" height="16">
    <path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <div
    #listboxPanel
    [id]="listboxId"
    role="listbox"
    [attr.aria-label]="label"
    class="listbox-popover"
    [style.position-anchor]="anchorName"
    popover="manual"
  >
    @for (state of states; track state.abbreviation; let i = $index) {
      <div
        [id]="optionId(i)"
        role="option"
        class="listbox-option"
        [class.active]="activeDescendantId === optionId(i)"
        [attr.aria-selected]="selectedIndex === i"
        (pointerenter)="onOptionPointerEnter(i)"
        (click)="onOptionClick(i)"
      >
        {{ state.name }} <span class="option-abbr">({{ state.abbreviation }})</span>
      </div>
    }
  </div>
</div>

<div [id]="errorId" class="form-error">{{ errorMessage }}</div>
