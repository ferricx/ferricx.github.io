<div class="label-row">
  <label [for]="fieldId">
    <span class="label-main">{{ label }}</span>
    @if (required) {
      <span class="required-indicator" aria-hidden="true">*</span>
      <span class="sr-only"> (required)</span>
    }
  </label>

  @if (tipContent) {
    <app-popover-tip [ariaLabel]="'Show tip for ' + label">
      <ng-container [ngTemplateOutlet]="tipContent"></ng-container>
    </app-popover-tip>
  }
</div>

<div class="combobox-wrapper">
  <input
    #comboInput
    [id]="fieldId"
    [name]="name"
    type="text"
    role="combobox"
    autocomplete="off"
    [attr.aria-expanded]="isOpen"
    [attr.aria-controls]="listboxId"
    [attr.aria-activedescendant]="activeDescendantId"
    aria-autocomplete="list"
    [attr.aria-describedby]="errorId"
    [attr.aria-required]="required || null"
    (input)="onInput()"
    (keydown)="onKeydown($event)"
    (blur)="onBlur()"
  />
  <svg class="combobox-arrow" aria-hidden="true" viewBox="0 0 16 16" width="16" height="16">
    <path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <div
    #listboxPanel
    [id]="listboxId"
    role="listbox"
    [attr.aria-label]="label"
    class="listbox-popover"
    popover="manual"
  >
    @for (state of filteredStates; track state.abbreviation; let i = $index) {
      <div
        [id]="optionId(i)"
        role="option"
        class="listbox-option"
        [class.active]="activeDescendantId === optionId(i)"
        [attr.aria-selected]="activeDescendantId === optionId(i)"
        (pointerenter)="onOptionPointerEnter(i)"
        (click)="onOptionClick(state)"
      >
        {{ state.name }} <span class="option-abbr">({{ state.abbreviation }})</span>
      </div>
    } @empty {
      <div class="listbox-no-results">No matching states</div>
    }
  </div>
</div>

<div [id]="errorId" class="form-error">{{ errorMessage }}</div>
