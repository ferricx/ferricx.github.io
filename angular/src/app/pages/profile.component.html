
<h1 tabindex="-1" #pageHeading>Profile</h1>

<section class="theme-section" aria-labelledby="theme-heading">
  <h2 id="theme-heading">Theme</h2>
  <p>Pick a color to generate a site-wide theme.</p>
  <div class="theme-controls">
    <label for="theme-color">Theme color</label>
    <input
      id="theme-color"
      type="color"
      [value]="sourceColor"
      (input)="onColorChange($event)"
    />
    <span class="color-hex">{{ sourceColor }}</span>
  </div>
  <div class="theme-controls mode-toggle">
    <label for="theme-mode">Dark mode</label>
    <input
      id="theme-mode"
      type="checkbox"
      role="switch"
      [checked]="isDark"
      (change)="onModeToggle($event)"
    />
  </div>
  <div class="theme-controls">
    <button type="button" class="reset-theme" (click)="resetTheme()">Reset to default</button>
  </div>
</section>
