<form #regForm="ngForm" (ngSubmit)="onSubmit(regForm)" novalidate>
  <div>
    <label for="firstName">First Name</label>
    <input id="firstName" name="firstName" ngModel required pattern="[A-Za-z]+(?:[ '-][A-Za-z]+)*" #firstNameCtrl="ngModel">
    <div class="form-error" *ngIf="firstNameCtrl.invalid && (firstNameCtrl.dirty || regForm.submitted)">
      <span *ngIf="firstNameCtrl.errors?.['required']">First name is required.</span>
      <span *ngIf="firstNameCtrl.errors?.['pattern']">First name can include letters, spaces, apostrophes, and hyphens.</span>
    </div>
  </div>
  <div>
    <label for="email">Email</label>
    <input id="email" name="email" ngModel required type="email" #emailCtrl="ngModel">
    <div class="form-error" *ngIf="emailCtrl.invalid && (emailCtrl.dirty || regForm.submitted)">
      <span *ngIf="emailCtrl.errors?.['required']">Email is required.</span>
      <span *ngIf="emailCtrl.errors?.['email']">Enter a valid email address.</span>
    </div>
  </div>
  <div>
    <label for="phone">Phone</label>
    <input id="phone" name="phone" ngModel required pattern="\+?[0-9()\-\s]{7,20}" #phoneCtrl="ngModel">
    <div class="form-error" *ngIf="phoneCtrl.invalid && (phoneCtrl.dirty || regForm.submitted)">
      <span *ngIf="phoneCtrl.errors?.['required']">Phone is required.</span>
      <span *ngIf="phoneCtrl.errors?.['pattern']">Phone number must be 7 to 20 characters and can include digits, spaces, parentheses, plus, and hyphens.</span>
    </div>
  </div>
  <button type="submit">Submit</button>
</form>
